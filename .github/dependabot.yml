version: 2
updates:
  - package-ecosystem: "uv"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    cooldown:
      default-days: 7
    directory: "/"  # Location of workflow files
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "ministryofjustice/hmpps-github-actions"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
  - package-ecosystem: "helm"
    directory: "/helm_deploy/hmpps-github-discovery"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: "weekly"
