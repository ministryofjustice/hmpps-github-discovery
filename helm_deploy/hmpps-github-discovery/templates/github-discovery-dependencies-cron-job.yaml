{{- if .Values.dependenciesCronJob.enabled -}}

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hmpps-github-discovery-dependencies-latest
spec:
  schedule: "{{ .Values.dependenciesCronJob.cron.github_discovery_dependencies_latest }}"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0 # Set to 0 to prevent retries after job failure
      ttlSecondsAfterFinished: 345600
      template:
        spec:
          containers:
            - name: github-discovery-dependencies-latest
              image: "{{ .Values.image.repository }}:{{ .Values.version }}"
              command: ["uv", "run", "python", "-u", "/app/github_dependency_discovery.py"]
              securityContext:
                capabilities:
                  drop:
                  - ALL
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
      {{- include "discoveryCronJob.envs" .Values | nindent 14 }}
          restartPolicy: Never
{{- end }}
